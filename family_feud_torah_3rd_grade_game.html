<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Torah Family Feud - 3rd Grade</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #1e4fa3, #071b44 70%);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .screen {
      width: 100%;
      min-height: 100vh;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 56px);
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 3px 3px 0 #000;
    }

    .round-label {
      font-size: clamp(18px, 2vw, 28px);
      background: #ffcc00;
      color: #101010;
      padding: 10px 18px;
      border-radius: 999px;
      font-weight: bold;
      box-shadow: 0 4px 0 #7a5c00;
    }

    .scoreboard {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 14px;
      align-items: center;
    }

    .team {
      background: rgba(255, 255, 255, 0.12);
      border: 3px solid rgba(255, 255, 255, 0.35);
      border-radius: 20px;
      padding: 12px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }

    .team input {
      width: 100%;
      background: transparent;
      color: white;
      border: none;
      text-align: center;
      font-size: clamp(20px, 2.5vw, 34px);
      font-weight: bold;
      outline: none;
    }

    .score {
      font-size: clamp(42px, 7vw, 90px);
      font-weight: bold;
      line-height: 1;
      color: #ffef7a;
      text-shadow: 3px 3px 0 #000;
    }

    .round-points {
      background: #111;
      border: 4px solid #ffcc00;
      border-radius: 18px;
      padding: 14px 24px;
      text-align: center;
      box-shadow: 0 8px 0 #000;
    }

    .round-points .label {
      font-size: 14px;
      text-transform: uppercase;
      opacity: .8;
    }

    .round-points .points {
      font-size: clamp(36px, 6vw, 74px);
      color: #ffcc00;
      font-weight: bold;
      line-height: 1;
    }

    .question-card {
      background: rgba(0, 0, 0, 0.45);
      border: 4px solid #ffcc00;
      border-radius: 24px;
      padding: 18px 22px;
      text-align: center;
      box-shadow: 0 12px 0 rgba(0,0,0,0.55);
    }

    .question-card h2 {
      margin: 0;
      font-size: clamp(24px, 4vw, 48px);
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 10px;
    }

    .answer {
      min-height: 76px;
      background: linear-gradient(180deg, #103c91, #082768);
      border: 4px solid #ffcc00;
      border-radius: 16px;
      color: white;
      font-size: clamp(22px, 3vw, 38px);
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 18px;
      cursor: pointer;
      box-shadow: 0 7px 0 #020b21;
      transition: transform .08s ease, filter .08s ease;
    }

    .answer:active {
      transform: translateY(4px);
      box-shadow: 0 3px 0 #020b21;
    }

    .answer.hidden-answer {
      justify-content: center;
      font-size: clamp(34px, 5vw, 60px);
      color: #ffcc00;
    }

    .answer.revealed {
      background: linear-gradient(180deg, #24884a, #12552c);
    }

    .points-badge {
      background: #ffcc00;
      color: #111;
      padding: 8px 14px;
      border-radius: 12px;
      min-width: 64px;
      text-align: center;
      margin-left: 14px;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: auto;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      background: #ffcc00;
      color: #111;
      box-shadow: 0 5px 0 #745d00;
    }

    button:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #745d00;
    }

    .danger {
      background: #ff4f4f;
      color: white;
      box-shadow: 0 5px 0 #7a1111;
    }

    .dark {
      background: #1b1b1b;
      color: white;
      box-shadow: 0 5px 0 #000;
    }

    .x-area {
      position: fixed;
      inset: 0;
      pointer-events: none;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 28vw;
      font-weight: 900;
      color: #ff2222;
      text-shadow: 8px 8px 0 #000;
      opacity: 0;
      transition: opacity .15s ease;
      z-index: 99;
    }

    .x-area.show {
      opacity: 1;
    }

    .small-note {
      text-align: center;
      opacity: .85;
      font-size: 14px;
    }

    @media (max-width: 700px) {
      .scoreboard {
        grid-template-columns: 1fr;
      }

      .answers {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="screen">
    <header>
      <h1>Torah Family Feud</h1>
      <div class="round-label" id="roundLabel">Round 1</div>
    </header>

    <section class="scoreboard">
      <div class="team">
        <input id="team1Name" value="Team 1" aria-label="Team 1 name" />
        <div class="score" id="team1Score">0</div>
        <button onclick="awardToTeam(1)">Give Round Points</button>
      </div>

      <div class="round-points">
        <div class="label">Round Points</div>
        <div class="points" id="roundPoints">0</div>
      </div>

      <div class="team">
        <input id="team2Name" value="Team 2" aria-label="Team 2 name" />
        <div class="score" id="team2Score">0</div>
        <button onclick="awardToTeam(2)">Give Round Points</button>
      </div>
    </section>

    <section class="question-card">
      <h2 id="questionText"></h2>
    </section>

    <main class="answers" id="answers"></main>

    <div class="controls">
      <button onclick="previousRound()">← Previous Round</button>
      <button onclick="nextRound()">Next Round →</button>
      <button class="danger" onclick="showStrike()">X / Wrong Answer</button>
      <button class="dark" onclick="resetRound()">Reset This Round</button>
      <button class="dark" onclick="resetGame()">Reset Whole Game</button>
    </div>

    <div class="small-note">Teacher tip: click an answer to reveal it. Click “Give Round Points” when a team wins the board or steals.</div>
  </div>

  <div class="x-area" id="xArea">X</div>

  <script>
    const rounds = [
      {
        title: "Things Bnei Yisrael might have complained about in the desert",
        answers: [
          ["No food / hungry", 35],
          ["No water", 30],
          ["Too hot", 15],
          ["Too much walking", 10],
          ["Missing Egypt", 7],
          ["Sand everywhere", 3]
        ]
      },
      {
        title: "Name something people do in tefillah",
        answers: [
          ["Pray", 30],
          ["Sing", 25],
          ["Read Hebrew", 15],
          ["Stand up", 10],
          ["Close eyes", 10],
          ["Bow", 10]
        ]
      },
      {
        title: "Name something people bring to Shabbat dinner",
        answers: [
          ["Challah", 30],
          ["Chicken", 20],
          ["Grape juice", 18],
          ["Candles", 12],
          ["Dessert", 10],
          ["Guests", 10]
        ]
      },
      {
        title: "Name something Moshe used",
        answers: [
          ["Staff", 35],
          ["Tablets / Ten Commandments", 25],
          ["Sandals", 15],
          ["Basket", 10],
          ["Beard", 10],
          ["Sheep", 5]
        ]
      },
      {
        title: "Name something that happened at Har Sinai",
        answers: [
          ["Torah given", 30],
          ["Ten Commandments", 25],
          ["Thunder", 15],
          ["Lightning", 10],
          ["Mountain shaking", 10],
          ["Shofar sound", 10]
        ]
      },
      {
        title: "Name a reason people say they are thankful to God",
        answers: [
          ["Family", 30],
          ["Food", 25],
          ["Home", 15],
          ["Friends", 10],
          ["Health", 10],
          ["Pets", 10]
        ]
      },
      {
        title: "Lightning Round: Name a Jewish holiday with food everyone waits for",
        answers: [
          ["Passover", 30],
          ["Purim", 25],
          ["Shabbat", 20],
          ["Chanukah", 15],
          ["Shavuot", 10]
        ]
      },
      {
        title: "Lightning Round: Name someone from the Torah kids would want as a friend",
        answers: [
          ["Moshe", 30],
          ["David", 25],
          ["Miriam", 20],
          ["Avraham", 15],
          ["Yosef", 10]
        ]
      },
      {
        title: "Lightning Round: Name something you might find in a synagogue",
        answers: [
          ["Torah", 30],
          ["Rabbi", 25],
          ["Books", 20],
          ["Ark", 15],
          ["Kippah", 10]
        ]
      },
      {
        title: "Lightning Round: Name something a Cohen does",
        answers: [
          ["Blesses people", 30],
          ["Raises hands", 25],
          ["Goes up front", 20],
          ["Washes hands", 15],
          ["Sings", 10]
        ]
      },
      {
        title: "Brain Rot Bonus: Name something that would make you rage quit the desert",
        answers: [
          ["No Wi-Fi", 30],
          ["No snacks", 25],
          ["Sand in shoes", 20],
          ["Forty years", 15],
          ["Manna again", 10]
        ]
      }
    ];

    let currentRound = 0;
    let revealed = [];
    let team1Score = 0;
    let team2Score = 0;
    let roundPoints = 0;

    const roundLabel = document.getElementById("roundLabel");
    const questionText = document.getElementById("questionText");
    const answersDiv = document.getElementById("answers");
    const roundPointsEl = document.getElementById("roundPoints");
    const team1ScoreEl = document.getElementById("team1Score");
    const team2ScoreEl = document.getElementById("team2Score");
    const xArea = document.getElementById("xArea");

    function renderRound() {
      const round = rounds[currentRound];
      roundLabel.textContent = `Round ${currentRound + 1} of ${rounds.length}`;
      questionText.textContent = round.title;
      answersDiv.innerHTML = "";

      round.answers.forEach((answer, index) => {
        const div = document.createElement("div");
        const isRevealed = revealed[index];
        div.className = isRevealed ? "answer revealed" : "answer hidden-answer";
        div.onclick = () => revealAnswer(index);

        if (isRevealed) {
          div.innerHTML = `<span>${answer[0]}</span><span class="points-badge">${answer[1]}</span>`;
        } else {
          div.textContent = index + 1;
        }

        answersDiv.appendChild(div);
      });

      updateScores();
    }

    function revealAnswer(index) {
      if (revealed[index]) return;
      revealed[index] = true;
      roundPoints += rounds[currentRound].answers[index][1];
      renderRound();
    }

    function updateScores() {
      roundPointsEl.textContent = roundPoints;
      team1ScoreEl.textContent = team1Score;
      team2ScoreEl.textContent = team2Score;
    }

    function awardToTeam(team) {
      if (team === 1) {
        team1Score += roundPoints;
      } else {
        team2Score += roundPoints;
      }
      roundPoints = 0;
      updateScores();
    }

    function nextRound() {
      if (currentRound < rounds.length - 1) {
        currentRound++;
        resetRoundState();
        renderRound();
      }
    }

    function previousRound() {
      if (currentRound > 0) {
        currentRound--;
        resetRoundState();
        renderRound();
      }
    }

    function resetRoundState() {
      revealed = rounds[currentRound].answers.map(() => false);
      roundPoints = 0;
    }

    function resetRound() {
      resetRoundState();
      renderRound();
    }

    function resetGame() {
      currentRound = 0;
      team1Score = 0;
      team2Score = 0;
      resetRoundState();
      renderRound();
    }

    function showStrike() {
      xArea.classList.add("show");
      setTimeout(() => {
        xArea.classList.remove("show");
      }, 850);
    }

    resetRoundState();
    renderRound();
  </script>
</body>
</html>
